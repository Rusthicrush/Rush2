*{box-sizing:border-box;margin:0;padding:0;}
:root{--lime:#c8ff00;--cyan:#00e5ff;--pink:#ff3d7f;--bg:#03030a;--card:#0b0b16;--border:#1a1a30;--muted:#555572;--text:#e2e2f0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--lime)}
input[type=range]{accent-color:var(--lime)}::placeholder{color:#333355}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rstP{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.015)}}
@keyframes badgeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
canvas#galaxy{position:fixed;inset:0;z-index:0;pointer-events:none;}
#rst-wm{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:hidden;}
#rst-wm span{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,26vw,300px);letter-spacing:.2em;color:transparent;-webkit-text-stroke:1px rgba(200,255,0,0.055);text-shadow:0 0 120px rgba(200,255,0,0.03);animation:rstP 7s ease-in-out infinite;user-select:none;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(3,3,10,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(200,255,0,.07);padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.15em;color:var(--lime);flex-shrink:0;}
.nav-right{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.nav-links{display:flex;gap:1rem;}
.nav-btn{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.16em;color:var(--muted);cursor:pointer;text-transform:uppercase;background:none;border:none;transition:color .2s;}
.nav-btn.active,.nav-btn:hover{color:var(--lime);}
.lang-toggle{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.lang-btn{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;padding:.3rem .7rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--lime);color:var(--bg);font-weight:700;}
section{position:relative;z-index:10;}
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.badge{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.25em;color:var(--lime);background:rgba(200,255,0,.07);border:1px solid rgba(200,255,0,.17);padding:.4rem 1.1rem;border-radius:999px;margin-bottom:2rem;animation:fu .5s ease both;}
h1.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,14vw,9.5rem);line-height:.88;animation:fu .5s .1s ease both;}
h1.hero-title .lime{color:var(--lime);}h1.hero-title .cyan{color:var(--cyan);}
.hero-sub{font-family:'Space Mono',monospace;font-size:clamp(.65rem,2vw,.83rem);color:var(--muted);margin-top:1.5rem;line-height:1.9;animation:fu .5s .2s ease both;}
.hero-btns{margin-top:2.5rem;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;animation:fu .5s .3s ease both;}
.btn-p{background:var(--lime);color:var(--bg);border:none;padding:.9rem 2rem;font-family:'Space Mono',monospace;font-size:.74rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:opacity .2s;}
.btn-p:hover{opacity:.85;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);padding:.9rem 2rem;font-family:'Space Mono',monospace;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:color .2s,border-color .2s;}
.btn-g:hover{color:var(--text);border-color:var(--muted);}
.btn-wa{background:#25D366!important;color:#fff!important;border-color:#25D366!important;}
#simulate{padding:5rem 0;background:rgba(11,11,22,.82);backdrop-filter:blur(18px);}
.container{max-width:900px;margin:0 auto;padding:0 1.5rem;}
.sec-tag{font-family:'Space Mono',monospace;font-size:.59rem;letter-spacing:.3em;color:var(--lime);text-transform:uppercase;margin-bottom:.55rem;}
h2.sec-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,7vw,4.5rem);line-height:1;}
.sec-sub{color:var(--muted);font-size:.84rem;line-height:1.7;margin-top:.4rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:2rem;}
.full{grid-column:1/-1;}
label.lbl{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem;display:block;}
label.lbl .lv{color:var(--lime);}
.inp{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:.82rem 1rem;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:rgba(200,255,0,.4);}
select.inp{background:rgba(11,11,22,.95);}
.tags{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.25rem;}
.tag{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--muted);padding:.32rem .82rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .18s;border-radius:2px;}
.tag.active{background:rgba(200,255,0,.10);border-color:var(--lime);color:var(--lime);}
.sim-center{display:flex;flex-direction:column;align-items:center;gap:.8rem;margin-top:.5rem;}
.btn-sim{width:100%;max-width:340px;font-size:.82rem;padding:1rem 2rem;}
.sim-note{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--muted);}
#loading{display:none;flex-direction:column;align-items:center;gap:1.5rem;padding:4rem 2rem;text-align:center;}
#loading.show{display:flex;}
.spinner{width:54px;height:54px;border:2px solid var(--border);border-top-color:var(--lime);border-radius:50%;animation:spin .8s linear infinite;}
.load-title{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.2em;}
.phase-list{margin-top:.75rem;display:flex;flex-direction:column;gap:.38rem;}
.phase{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--border);transition:color .3s;}
.phase.done{color:var(--lime);}
#result{display:none;margin-top:3rem;}
#result.show{display:block;}
.res-label{font-family:'Space Mono',monospace;font-size:.59rem;letter-spacing:.3em;color:var(--lime);text-transform:uppercase;margin-bottom:.55rem;}
.res-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,7vw,4.5rem);line-height:1;}
.res-card{background:rgba(11,11,22,.9);border:1px solid var(--border);padding:2.5rem;margin-top:1.5rem;position:relative;overflow:hidden;}
.res-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--lime),var(--cyan),var(--pink));}
.meta-row{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.meta-k{font-family:'Space Mono',monospace;font-size:.57rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.meta-v{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--lime);}
.divider{height:1px;background:var(--border);margin:1.5rem 0;}
#res-text{font-size:.94rem;line-height:1.95;color:var(--text);white-space:pre-wrap;}
.fb-row{display:inline-flex;align-items:center;gap:.4rem;font-family:'Space Mono',monospace;font-size:.57rem;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--border);padding:.28rem .7rem;margin-top:.8rem;border-radius:2px;}

.fb-dot.saving{animation:spin 1s linear infinite;}
.fb-dot.ok{background:var(--lime);}
.fb-dot.fail{background:var(--pink);}
.act-btns{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:1.5rem;}

textarea.inp{resize:none;min-height:110px;border:none;border-bottom:1px solid var(--border);background:transparent;padding-bottom:1rem;}
.let-footer{margin-top:1.5rem;display:flex;align-items:flex-end;gap:1rem;flex-wrap:wrap;}
.let-date{flex:1;min-width:200px;}
.sealed-box{background:rgba(11,11,22,.85);border:1px solid rgba(0,229,255,.22);padding:2rem;margin-top:1.5rem;text-align:center;}
.sealed-h{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--cyan);}

.cd-blk{display:flex;flex-direction:column;align-items:center;gap:.18rem;}

.unlocked{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--lime);}
footer{border-top:1px solid var(--border);padding:2rem 1.5rem;text-align:center;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);position:relative;z-index:10;}

#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);z-index:200;align-items:center;justify-content:center;padding:1.5rem;}
#modal-ov.show{display:flex;}
.modal-box{background:var(--card);border:1px solid var(--border);max-width:700px;width:100%;max-height:80vh;overflow-y:auto;padding:2rem;position:relative;}
.modal-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--lime));}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:.33rem .62rem;cursor:pointer;font-family:'Space Mono',monospace;font-size:.63rem;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--lime);margin-bottom:.38rem;}
.modal-meta{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:1.5rem;}
.modal-text{font-size:.92rem;line-height:1.95;color:var(--text);white-space:pre-wrap;}
#toast{display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--bg);font-family:'Space Mono',monospace;font-size:.7rem;padding:.72rem 1.5rem;z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(200,255,0,.3);border-radius:2px;}

#wa-badge{display:none;position:fixed;bottom:5rem;right:1.5rem;z-index:999;background:#25D366;color:#fff;font-family:'Space Mono',monospace;font-size:.63rem;padding:.58rem 1rem;cursor:pointer;border-radius:4px;box-shadow:0 4px 20px rgba(37,211,102,.4);animation:badgeIn .4s ease;}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}.full{grid-column:1;}
  .act-btns,.hero-btns{flex-direction:column;align-items:stretch;}
  .nav-right{gap:.6rem;}
}
