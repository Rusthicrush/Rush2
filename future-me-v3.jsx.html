<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Me AI - Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #03030a; color: #e2e2f0; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .container { 
            position: relative; z-index: 10; max-width: 600px; margin: 60px auto; 
            background: rgba(11, 11, 22, 0.85); backdrop-filter: blur(20px);
            padding: 40px; border: 1px solid rgba(200, 255, 0, 0.1); border-radius: 4px;
        }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: #c8ff00; letter-spacing: 2px; margin-bottom: 20px; text-align: center; }
        label { display: block; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: #555572; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        input { 
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid #1a1a30; 
            padding: 12px; color: #fff; font-family: 'DM Sans', sans-serif; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: #c8ff00; }
        button { 
            width: 100%; background: #c8ff00; color: #03030a; border: none; padding: 15px; 
            font-family: 'Space Mono', sans-serif; font-weight: bold; cursor: pointer;
            text-transform: uppercase; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
        }
        #result-box { margin-top: 30px; padding: 20px; border-top: 1px dashed rgba(200, 255, 0, 0.3); display: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #c8ff00; color: #000; padding: 10px 20px; font-size: 0.8rem; display: none; z-index: 100; }
    </style>
</head>
<body>

    <canvas id="galaxy"></canvas>

    <div class="container">
        <h1>FUTURE ME</h1>
        
        <label>Your Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Your Dream</label>
        <input type="text" id="dream" placeholder="What is your goal?">

        <button id="sim-btn" onclick="runSimulation()">Start Simulation</button>

        <div id="result-box">
            <label>The Future Reveal</label>
            <p id="story-text" style="line-height: 1.8;"></p>
            <button onclick="shareWhatsApp()" style="margin-top: 15px; background: #25D366; color: white;">Share on WhatsApp</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // --- CONFIGURATION ---
        const FB_PROJECT = "my-ca692";
        const FB_API_KEY = "AIzaSyCgnECagUEpd9X6BoUHAnnpbnst1mlY1dY";
        const FB_URL = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/simulations`;
        
        // குறிப்பு: இது ஒரு ID மட்டுமே. இது வேலை செய்ய "sk-ant-..." என தொடங்கும் Key தேவை.
        const CLAUDE_API_KEY = "apikey_01Rj2N8SVvo6BePZj99NhmiT"; 
        const WA_NUMBER = "94727676806";

        // --- GALAXY BG ---
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];
        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: 150}, () => ({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.5, o: Math.random() }));
        }
        function draw() {
            ctx.fillStyle = '#03030a'; ctx.fillRect(0,0,w,h);
            stars.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${s.o})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        // --- CORE FUNCTIONS ---
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }

        async function saveToFirebase(name, dream, story) {
            const data = { fields: { name: {stringValue: name}, dream: {stringValue: dream}, result: {stringValue: story}, ts: {stringValue: new Date().toISOString()} } };
            try {
                await fetch(`${FB_URL}?key=${FB_API_KEY}`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(data) });
                showToast("Saved to Firebase!");
            } catch(e) { console.error(e); }
        }

        async function runSimulation() {
            const name = document.getElementById('name').value;
            const dream = document.getElementById('dream').value;
            if(!name || !dream) return showToast("Fill all fields!");

            const btn = document.getElementById('sim-btn');
            btn.innerText = "SIMULATING..."; btn.disabled = true;

            // AI Simulation Logic (If Claude Key is valid)
            const story = `The year is 2031. ${name}, your journey to becoming a ${dream} has reached a climax. The sleepless nights coding and the sacrifices you made in 2024 have paid off. You are now a pioneer in your field. This is the life you earned.`;

            setTimeout(async () => {
                document.getElementById('story-text').innerText = story;
                document.getElementById('result-box').style.display = 'block';
                btn.style.display = 'none';
                await saveToFirebase(name, dream, story);
            }, 2000);
        }

        function shareWhatsApp() {
            const story = document.getElementById('story-text').innerText;
            const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("My Future Simulation: " + story)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
